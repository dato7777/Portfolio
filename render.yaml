# Render Blueprint — https://render.com/docs/blueprint-spec

services:
  - type: web
    name: portfolio-api
    runtime: python
    plan: free
    region: frankfurt
    branch: staging
    buildCommand: pip install -r backend_portfolio/requirements.txt
    startCommand: uvicorn backend_portfolio.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
