# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: portfolio-api
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r backend_portfolio/requirements.txt
    startCommand: uvicorn backend_portfolio.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SQLITE_PATH
        value: /data/quiz.db
      - key: BUY_SMART_SQLITE_PATH
        value: /data/buy_smart.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 1
